name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l cmd internal)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test -race ./...

  native-macos:
    name: macOS interpose dylib
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build dylib
        run: make -C native/macos
      - name: Sanity — dylib is a Mach-O
        run: file native/macos/rcc_interpose.dylib | grep -q 'Mach-O'

  e2e-paircode:
    name: pairing-code e2e (macOS, no claude)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Full pipeline — rca serve + --code + injected toy target
        run: scripts/e2e-paircode.sh

  native-linux:
    name: Linux seccomp supervisor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build supervisor
        run: make -C native/linux
      - name: Sanity — binary is an ELF
        run: file native/linux/rcc_seccomp | grep -q 'ELF'
